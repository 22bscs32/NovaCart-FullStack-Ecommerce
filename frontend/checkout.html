<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout - NovaCart Store</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
  <div class="container">
    <a class="navbar-brand fw-bold fs-3" href="index.html">
      🛒 NovaCart Store
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
        <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
        <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
        <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
      </ul>
    </div>
  </div>
</nav>
</nav>

<section class="py-5">
  <div class="container">
    <h2 class="text-center mb-4">Checkout</h2>

    <div class="row">
      <div class="col-md-7">
        <form id="checkoutForm" class="card p-4 shadow-sm">
          <h4 class="mb-3">Shipping Details</h4>

          <input type="text" id="fullName" class="form-control mb-3" placeholder="Full Name" required>
          <input type="email" id="email" class="form-control mb-3" placeholder="Email Address" required>
          <input type="text" id="phone" class="form-control mb-3" placeholder="Phone Number" required>
          <textarea id="address" class="form-control mb-3" rows="4" placeholder="Full Address" required></textarea>

          <button type="submit" class="btn btn-success w-100">Place Order</button>
        </form>
      </div>

      <div class="col-md-5">
        <div class="card p-4 shadow-sm">
          <h4>Order Summary</h4>
          <div id="checkoutItems"></div>
          <hr>
          <h5 id="checkoutTotal"></h5>
        </div>
      </div>
    </div>
  </div>
</section>

<script src="js/script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
